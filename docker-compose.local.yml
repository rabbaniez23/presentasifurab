version: '3.8'

services:
  # ==========================================
  # FURAB BACKEND - LOCAL FALLBACK FOR PRESENTATION
  # ==========================================
  
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./furab-backend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - ride-service
      - food-service
      - payment-service

  auth-service:
    image: node:18-alpine
    working_dir: /app
    command: npm start
    environment:
      - PORT=3001
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db

  ride-service:
    image: node:18-alpine
    working_dir: /app
    command: npm start
    environment:
      - PORT=3002
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db

  food-service:
    image: node:18-alpine
    working_dir: /app
    command: npm start
    environment:
      - PORT=3003
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db

  payment-service:
    image: node:18-alpine
    working_dir: /app
    command: npm start
    environment:
      - PORT=3004
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=furab
      - POSTGRES_PASSWORD=furabsecret
      - POSTGRES_DB=furab_db
    ports:
      - "5432:5432"

# Note: Ini adalah skeleton docker-compose untuk demonstrasi fallback saat presentasi.
